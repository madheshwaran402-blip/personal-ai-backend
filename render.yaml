services:
  - type: web
    name: madheshwaran-personal-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MODEL
        value: llama3.2
      - key: FALLBACK_MODEL
        value: llama3.2
      - key: OLLAMA_URL
        fromService:
          type: web
          name: ollama-service
          envVarKey: RENDER_EXTERNAL_URL
    healthCheckPath: /health